name: "SBOM Generation"

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  packages: read

jobs:
  sbom-generation:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Authenticate NuGet with GitHub Packages
        run: dotnet nuget add source https://nuget.pkg.github.com/Keyfactor/index.json --name keyfactor-github --username ${{ github.actor }} --password ${{ secrets.V2BUILDTOKEN }} --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore

      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM for main project
        run: |
          dotnet CycloneDX kubernetes-orchestrator-extension/Keyfactor.Orchestrators.K8S.csproj \
            -o sbom \
            -f k8s-orchestrator-sbom.json \
            --json

      - name: Generate SBOM in SPDX format
        run: |
          dotnet CycloneDX kubernetes-orchestrator-extension/Keyfactor.Orchestrators.K8S.csproj \
            -o sbom \
            -f k8s-orchestrator-sbom.xml \
            --xml
        continue-on-error: true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-artifacts
          path: sbom/
          retention-days: 90

      - name: Attach SBOM to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sbom/k8s-orchestrator-sbom.json
            sbom/k8s-orchestrator-sbom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
