name: Unit Tests

on:
  pull_request:
    branches: [ main, release-* ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/unit-tests.yml'
  push:
    branches: [ main ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/unit-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

jobs:
  test:
    name: Unit Tests (.NET ${{ matrix.dotnet-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet-version: '8.0.x'
            framework: 'net8.0'
          - dotnet-version: '10.0.x'
            framework: 'net10.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Display .NET version
        run: dotnet --version

      - name: Authenticate NuGet with GitHub Packages
        run: dotnet nuget add source https://nuget.pkg.github.com/Keyfactor/index.json --name keyfactor-github --username ${{ github.actor }} --password ${{ secrets.V2BUILDTOKEN }} --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests with coverage
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --framework ${{ matrix.framework }} \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results-${{ matrix.dotnet-version }}.trx" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            TestResults/**/*.trx
          check_name: Unit Test Results (.NET ${{ matrix.dotnet-version }})
          comment_title: Unit Test Results (.NET ${{ matrix.dotnet-version }})

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.dotnet-version == '8.0.x'
        with:
          files: ./TestResults/**/coverage.opencover.xml
          flags: unittests
          name: unit-tests-net8
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage report
        if: matrix.dotnet-version == '8.0.x'
        continue-on-error: true
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./TestResults/**/coverage.opencover.xml" \
            -targetdir:"./TestResults/CoverageReport" \
            -reporttypes:"Html;MarkdownSummaryGithub" \
            -verbosity:Warning

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.dotnet-version == '8.0.x'
        with:
          name: coverage-report-net8
          path: ./TestResults/CoverageReport/
          retention-days: 30

      - name: Add coverage summary to PR
        if: matrix.dotnet-version == '8.0.x' && github.event_name == 'pull_request'
        run: |
          if [ -f "./TestResults/CoverageReport/SummaryGithub.md" ]; then
            echo "## Unit Test Coverage Report (.NET 8.0)" >> $GITHUB_STEP_SUMMARY
            cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results-${{ matrix.dotnet-version }}
          path: ./TestResults/**/*.trx
          retention-days: 30

  test-summary:
    name: Unit Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "::error::Unit tests failed. Please review the test results."
            exit 1
          elif [ "${{ needs.test.result }}" == "cancelled" ]; then
            echo "::warning::Unit tests were cancelled."
            exit 1
          else
            echo "::notice::All unit tests passed successfully!"
          fi
