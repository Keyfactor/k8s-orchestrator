name: "Container Security Scan"

# Only run if you build Docker containers for this orchestrator
on:
  push:
    branches: [ "main", "release-*" ]
    paths:
      - 'Dockerfile*'
      - '**/*.csproj'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Dockerfile*'
      - '**/*.csproj'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  container-scan:
    name: Scan Container Image
    runs-on: ubuntu-latest
    # Uncomment if you have a Dockerfile
    if: false  # Set to true when you have a Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image (adjust paths as needed)
      - name: Build container image
        run: |
          docker build -t k8s-orchestrator:${{ github.sha }} .

      # Scan with Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'k8s-orchestrator:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Scan with Grype
      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v3
        with:
          image: 'k8s-orchestrator:${{ github.sha }}'
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
